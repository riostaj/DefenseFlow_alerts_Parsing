# alert_parser.ini — Global configuration for parse_alerts.py
#
# ─────────────────────────────────────────────────────────────────
# [range]  — time-range filter applied to BOTH parsers
# ─────────────────────────────────────────────────────────────────
# Only ONE option is used at a time.
# Priority order: start/end  >  last_hours  >  last_days
# Leave all options commented out to include all records.
#
# Option 1 — fixed window:
#   start = YYYY-MM-DD HH:MM:SS   (inclusive)
#   end   = YYYY-MM-DD HH:MM:SS   (inclusive; omit to use current time)
#
# Option 2 — rolling window from now:
#   last_hours = 24
#
# Option 3 — rolling window from start of day N days ago:
#   last_days = 7

[range]
 start      = 2026-03-01 00:00:00
 end        = 2026-03-31 23:59:59
# last_hours = 24
# last_days  = 7

# ─────────────────────────────────────────────────────────────────
# [arbor]  — paths for the Arbor attack-cycle report
# ─────────────────────────────────────────────────────────────────
# log_dir : folder that contains alert*.log files
# out_file: output CSV path; {datetime} is replaced with YYYY-MM-DD_HH-MM-SS
#           {date} (date only) is also supported for backwards compatibility

[arbor]
log_dir  = Arbor/Input
out_file = Arbor/Reports/arbor_attack_cycles_{datetime}.csv

# ─────────────────────────────────────────────────────────────────
# [kentik]  — paths for the Kentik attack-cycle report
# ─────────────────────────────────────────────────────────────────

[kentik]
log_dir  = Kentik/Input
out_file = Kentik/Reports/kentik_attack_cycles_{datetime}.csv

# ─────────────────────────────────────────────────────────────────
# [defensepro]  — paths and settings for the DefensePro report
# ─────────────────────────────────────────────────────────────────
#
# gap_minutes
#   DefensePro logs individual detection events, not one record per
#   attack.  A single volumetric attack can generate hundreds of
#   DFC00701 "attack started" lines as the appliance re-detects it
#   every reporting interval.
#
#   The script groups those raw events into a single "session" as
#   long as consecutive events for the same key
#   (Sensor + ProtectedObject + TargetNetwork) arrive within
#   gap_minutes of each other.
#
#   When a new event arrives MORE than gap_minutes after the
#   previous one, the current session is closed and a new one
#   begins — meaning the lull between them was long enough to be
#   treated as two separate attack episodes.
#
#   Choosing a value:
#     5  min  — strict; short pauses create separate sessions.
#     10 min  — default; good balance for most environments.
#     20 min  — lenient; keeps slow, intermittent floods together.
#
#   Rule of thumb: set gap_minutes to roughly the longest expected
#   quiet interval that still belongs to the same attack wave.

[defensepro]
log_dir     = Input
out_file    = Reports/defensepro_attack_sessions_{datetime}.csv
gap_minutes = 10
